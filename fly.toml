app = "frolladb"
primary_region = "syd"

[http_service]
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1
  force_https = true
  internal_port = 8080
  processes = ["app"]

[mounts]
  source = "frolar_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
